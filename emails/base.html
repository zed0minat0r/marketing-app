<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>{{SUBJECT}}</title>
<!--[if mso]>
<noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
<![endif]-->
<style>
  /* Reset */
  body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
  /* Base */
  body { margin: 0; padding: 0; background-color: #0e0d0b; font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .email-wrapper { background-color: #0e0d0b; padding: 40px 20px; }
  .email-container { max-width: 560px; margin: 0 auto; background-color: #141210; border: 1px solid #332f29; border-radius: 4px; overflow: hidden; }
  /* Header */
  .email-header { background-color: #141210; border-bottom: 1px solid #332f29; padding: 24px 32px; }
  .logo { font-family: 'Space Mono', 'Courier New', monospace; font-weight: 700; font-size: 18px; color: #f5f0e8; letter-spacing: -0.02em; text-decoration: none; }
  .logo span { color: #d4f53c; }
  /* Body */
  .email-body { padding: 36px 32px; }
  /* Typography */
  h1 { font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 26px; font-weight: 700; color: #f5f0e8; line-height: 1.2; letter-spacing: -0.03em; margin: 0 0 16px 0; }
  h2 { font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 20px; font-weight: 600; color: #f5f0e8; margin: 0 0 12px 0; letter-spacing: -0.02em; }
  p { font-size: 15px; line-height: 1.65; color: #b0a898; margin: 0 0 20px 0; }
  p.lead { font-size: 17px; color: #d4cfc5; }
  a { color: #d4f53c; text-decoration: none; }
  /* CTA Button */
  .btn-primary { display: inline-block; background-color: #d4f53c; color: #141210; font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.01em; padding: 13px 28px; border-radius: 4px; text-decoration: none; margin: 8px 0 24px 0; }
  .btn-secondary { display: inline-block; background-color: transparent; color: #d4f53c; font-family: 'Space Grotesk', -apple-system, sans-serif; font-size: 14px; font-weight: 600; padding: 11px 24px; border-radius: 4px; border: 1px solid #d4f53c; text-decoration: none; margin: 4px 0; }
  /* Divider */
  .divider { border: none; border-top: 1px solid #332f29; margin: 28px 0; }
  /* Highlight box */
  .highlight-box { background-color: rgba(212, 245, 60, 0.07); border: 1px solid rgba(212, 245, 60, 0.2); border-radius: 4px; padding: 18px 20px; margin: 24px 0; }
  .highlight-box p { margin: 0; color: #d4cfc5; font-size: 14px; }
  .highlight-box .big-number { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; color: #d4f53c; line-height: 1; display: block; margin-bottom: 6px; }
  /* Mono tag */
  .mono-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: #7d7060; letter-spacing: 0.06em; text-transform: uppercase; background: #1c1917; border: 1px solid #332f29; border-radius: 3px; padding: 4px 8px; display: inline-block; margin-bottom: 14px; }
  /* Step list */
  .step-list { margin: 0 0 24px 0; padding: 0; list-style: none; }
  .step-list li { font-size: 14px; color: #b0a898; padding: 10px 0 10px 0; border-bottom: 1px solid #1c1917; display: flex; align-items: flex-start; gap: 12px; }
  .step-list li:last-child { border-bottom: none; }
  .step-num { background: #d4f53c; color: #141210; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  /* Footer */
  .email-footer { background-color: #0e0d0b; border-top: 1px solid #332f29; padding: 24px 32px; text-align: center; }
  .email-footer p { font-size: 12px; color: #4a443c; margin: 0 0 6px 0; line-height: 1.5; }
  .email-footer a { color: #7d7060; font-size: 12px; }
  @media only screen and (max-width: 600px) {
    .email-body, .email-header, .email-footer { padding-left: 20px !important; padding-right: 20px !important; }
    h1 { font-size: 22px !important; }
    .btn-primary { display: block !important; text-align: center; }
  }
</style>
</head>
<body>
<div class="email-wrapper">
  <table class="email-container" width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <!-- Header -->
    <tr>
      <td class="email-header">
        <a href="https://zed0minat0r.github.io/marketing-app/" class="logo">sidekick<span>_</span></a>
      </td>
    </tr>
    <!-- Body -->
    <tr>
      <td class="email-body">
        {{BODY_CONTENT}}
      </td>
    </tr>
    <!-- Footer -->
    <tr>
      <td class="email-footer">
        <p>Sidekick &mdash; Your marketing sidekick, via text.</p>
        <p><a href="{{UNSUBSCRIBE_URL}}">Unsubscribe</a> &nbsp;&middot;&nbsp; <a href="https://zed0minat0r.github.io/marketing-app/">sidekick</a></p>
        <p style="color:#3a3628;margin-top:8px;">You're receiving this because you joined the Sidekick waitlist.</p>
      </td>
    </tr>
  </table>
</div>
</body>
</html>
